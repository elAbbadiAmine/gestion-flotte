apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-conducteurs
  namespace: flotte-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-conducteurs
  template:
    metadata:
      labels:
        app: svc-conducteurs
    spec:
      containers:
      - name: svc-conducteurs
        image: svc-conducteurs:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        resources:
          limits:
            memory: 256Mi
            cpu: "250m"
          requests:
            memory: 128Mi
            cpu: "100m"
