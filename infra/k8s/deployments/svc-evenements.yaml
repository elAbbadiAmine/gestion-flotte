apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-evenements
  namespace: flotte-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-evenements
  template:
    metadata:
      labels:
        app: svc-evenements
    spec:
      containers:
      - name: svc-evenements
        image: svc-evenements:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        resources:
          limits:
            memory: 256Mi
            cpu: "250m"
          requests:
            memory: 128Mi
            cpu: "100m"
