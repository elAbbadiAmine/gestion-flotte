apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-vehicules
  namespace: flotte-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-vehicules
  template:
    metadata:
      labels:
        app: svc-vehicules
    spec:
      containers:
      - name: svc-vehicules
        image: svc-vehicules:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        resources:
          limits:
            memory: 256Mi
            cpu: "250m"
          requests:
            memory: 128Mi
            cpu: "100m"
