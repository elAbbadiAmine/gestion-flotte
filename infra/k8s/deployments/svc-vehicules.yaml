apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-vehicules
  namespace: flotte-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: svc-vehicules
  template:
    metadata:
      labels:
        app: svc-vehicules
    spec:
      containers:
        - name: svc-vehicules
          image: svc-vehicules:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_URL_VEHICLES
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKER
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-opentelemetry-collector:4317"
            - name: KAFKAJS_NO_PARTITIONER_WARNING
              value: "1"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5