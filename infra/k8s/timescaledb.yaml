apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-timescaledb-0
  namespace: flotte-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  namespace: flotte-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb:latest-pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: localisation_db
            - name: POSTGRES_USER
              value: fleet_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "fleet_user", "-d", "localisation_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-timescaledb-0
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: flotte-dev
spec:
  selector:
    app: timescaledb
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
