apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: flotte-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:26.3.3
        imagePullPolicy: Never
        args: ["start-dev"]
        env:
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin_password_dev"
        - name: KC_HTTP_PORT
          value: "8080"
        - name: KC_DB
          value: "postgres"
        - name: KC_DB_URL
          value: "jdbc:postgresql://postgresql-fleet:5432/keycloak_db"
        - name: KC_DB_USERNAME
          value: "fleet_user"
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_PASSWORD
        - name: JAVA_OPTS_APPEND
          value: "-Xms256m -Xmx512m"
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 1Gi
            cpu: "1000m"
          requests:
            memory: 512Mi
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: flotte-dev
spec:
  selector:
    app: keycloak
  ports:
  - port: 8080
    targetPort: 8080
