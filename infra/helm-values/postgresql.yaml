auth:
  database: fleet_db
  username: fleet_user
  password: "fleet_password_dev"
  postgresPassword: "admin_password_dev"
primary:
  persistence:
    enabled: true
    size: 1Gi
  resources:
    limits:
      memory: 512Mi
      cpu: "500m"
    requests:
      memory: 256Mi
      cpu: "250m"
  initdb:
    scripts:
      init.sql: |
        CREATE DATABASE vehicles_db;
        CREATE DATABASE drivers_db;
        CREATE DATABASE maintenance_db;
        GRANT ALL PRIVILEGES ON DATABASE vehicles_db TO fleet_user;
        GRANT ALL PRIVILEGES ON DATABASE drivers_db TO fleet_user;
        GRANT ALL PRIVILEGES ON DATABASE maintenance_db TO fleet_user;
