mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch: {}

  exporters:
    otlp:
      endpoint: jaeger-collector:4317
      tls:
        insecure: true
    prometheus:
      endpoint: "0.0.0.0:8889"
    debug:
      verbosity: basic

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp, debug]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheus, debug]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]

resources:
  limits:
    memory: 256Mi
    cpu: "250m"
  requests:
    memory: 128Mi
    cpu: "100m"
