apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-conducteurs
  namespace: flotte-dev
  labels:
    app: svc-conducteurs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: svc-conducteurs
  template:
    metadata:
      labels:
        app: svc-conducteurs
    spec:
      containers:
        - name: svc-conducteurs
          image: svc-conducteurs:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_URL_CONDUCTEURS
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKER
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-opentelemetry-collector:4317"
            - name: PORT
              value: "3002"
            - name: KEYCLOAK_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_REALM
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: svc-conducteurs
  namespace: flotte-dev
spec:
  selector:
    app: svc-conducteurs
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
  type: ClusterIP
